<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Chi tiết sản phẩm</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"><link rel="stylesheet" href="style.css"></head>
<body>
<nav class="nav-luxury"><div class="container mx-auto px-4 py-2 flex justify-between"><a href="index.html" class="text-white font-bold">⌚ Hào Watches</a><a href="shop.html" class="text-gold">← Về cửa hàng</a></div></nav>
<div class="container mx-auto px-4 pt-24 pb-16" id="productDetail"></div>
<script src="script.js"></script>
<script>
    const params = new URLSearchParams(location.search);
    const product = getProductById(params.get('id'));
    const container = document.getElementById('productDetail');
    if(product) {
        let badgeHtml = '';
        if(product.badge === 'new') badgeHtml = '<span class="inline-block bg-gold text-black px-3 py-1 rounded-full text-sm font-bold mr-2">MỚI</span>';
        if(product.badge === 'sale') badgeHtml = '<span class="inline-block bg-red-600 text-white px-3 py-1 rounded-full text-sm font-bold mr-2">GIẢM GIÁ</span>';
        const ratingStars = Array(5).fill().map((_,i)=>`<i class="fa${i<product.rating?'s':'r'} fa-star text-yellow-400"></i>`).join('');
        container.innerHTML = `
            <div class="grid md:grid-cols-2 gap-8">
                <div class="rounded-2xl overflow-hidden shadow-lg"><img src="${product.image}" class="w-full"></div>
                <div>
                    <h1 class="text-4xl font-serif font-bold">${product.name}</h1>
                    <div class="mt-2">${badgeHtml}<span class="text-sm text-gray-500 ml-2">Thương hiệu: ${product.brand}</span></div>
                    <div class="flex items-center mt-2">${ratingStars} <span class="ml-2 text-sm text-gray-500">(${product.rating} sao)</span></div>
                    <div class="mt-4"><span class="price text-3xl">${product.price.toLocaleString()}₫</span>${product.originalPrice ? `<span class="old-price ml-2">${product.originalPrice.toLocaleString()}₫</span>` : ''}</div>
                    <p class="text-gray-600 mt-4">${product.description}</p>
                    <div class="mt-4 p-3 bg-gray-50 rounded-xl"><p class="text-sm">✅ Tình trạng: <span class="font-semibold text-green-600">Còn hàng</span></p><p class="text-sm">📦 Tồn kho: <strong>${product.stock}</strong> sản phẩm</p></div>
                    <div class="mt-4 flex items-center gap-3"><label class="font-medium">Số lượng:</label><input type="number" id="qty" value="1" min="1" max="${product.stock}" class="border rounded-lg w-20 px-3 py-2"></div>
                    <button onclick="addToCart(getProductById('${product.id}'), parseInt(document.getElementById('qty').value))" class="btn-gold mt-6 px-8 py-3 rounded-full">Thêm vào giỏ hàng</button>
                </div>
            </div>
        `;
    } else { container.innerHTML = '<p class="text-red-500">Không tìm thấy sản phẩm.</p>'; }
    updateCartCount();
</script>
</body>
</html>
