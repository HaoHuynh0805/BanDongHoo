<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Thanh toán - Hào Watches</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"><link rel="stylesheet" href="style.css"></head>
<body>
<nav class="nav-luxury"><div class="container mx-auto px-4 py-2"><a href="index.html" class="text-white font-bold">Hào Watches</a></div></nav>
<div class="container mx-auto px-4 py-10 max-w-2xl"><h1 class="text-3xl font-serif shimmer-text mb-6">Thông tin đặt hàng</h1><div id="previewCart" class="bg-white p-4 rounded-2xl shadow mb-6"></div><div class="bg-white p-6 rounded-2xl shadow"><input type="text" id="fullname" placeholder="Họ tên *" class="filter-input mb-3"><input type="tel" id="phone" placeholder="Số điện thoại *" class="filter-input mb-3"><textarea id="address" placeholder="Địa chỉ giao hàng *" rows="3" class="filter-input mb-3"></textarea><button id="placeOrderBtn" class="btn-gold w-full py-3 rounded-xl text-lg">Xác nhận đặt hàng</button></div></div>
<script src="script.js"></script>
<script>
    function preview() {
        const cart = getCart();
        if(!cart.length) { window.location.href='cart.html'; return; }
        let total = 0;
        let html = '<ul class="space-y-2">';
        cart.forEach(i => { total += i.price * i.quantity; html += `<li>${i.name} x${i.quantity} - <span class="price">${(i.price*i.quantity).toLocaleString()}₫</span></li>`; });
        html += `</ul><p class="font-bold mt-4 text-right text-xl">Tổng: ${total.toLocaleString()}₫</p>`;
        document.getElementById('previewCart').innerHTML = html;
    }
    document.getElementById('placeOrderBtn').addEventListener('click', () => {
        const fullname = document.getElementById('fullname').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const address = document.getElementById('address').value.trim();
        if(!fullname || !phone || !address) { alert('Vui lòng nhập đầy đủ thông tin'); return; }
        const cart = getCart();
        if(!cart.length) { alert('Giỏ hàng trống'); return; }
        const orders = getOrders();
        const total = cart.reduce((s,i)=>s+i.price*i.quantity,0);
        const newOrder = { id: 'ORD' + Date.now(), date: new Date().toLocaleString(), customer: { fullname, phone, address }, items: JSON.parse(JSON.stringify(cart)), total, status: 'Đã xác nhận' };
        orders.unshift(newOrder);
        saveOrders(orders);
        saveCart([]);
        alert('Đặt hàng thành công! Cảm ơn quý khách.');
        window.location.href = 'index.html';
    });
    preview(); updateCartCount();
</script>
</body>
</html>
