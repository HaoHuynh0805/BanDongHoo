<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Đăng nhập Admin</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"><link rel="stylesheet" href="style.css"></head>
<body class="login-container"><div class="login-card"><div class="text-center mb-6"><i class="fas fa-crown text-5xl text-gold"></i><h1 class="text-3xl font-serif shimmer-text mt-2">Admin Login</h1></div><form id="loginForm"><div class="relative mb-4"><i class="fas fa-user absolute left-4 top-3 text-gray-400"></i><input type="text" id="username" placeholder="Tên đăng nhập" class="login-input pl-10" value="admin" disabled></div><div class="relative mb-4"><i class="fas fa-lock absolute left-4 top-3 text-gray-400"></i><input type="password" id="password" placeholder="Mật khẩu" class="login-input pl-10" autofocus></div><button type="submit" class="btn-gold w-full py-3">Đăng nhập</button><div id="errorMsg" class="login-error mt-4"></div></form><p class="text-center text-gray-500 text-xs mt-6">Mật khẩu: <strong class="text-gold">admin123</strong></p></div><script src="script.js"></script><script>document.getElementById('loginForm').addEventListener('submit',(e)=>{e.preventDefault();const pwd=document.getElementById('password').value;if(adminLogin(pwd)){window.location.href='admin.html';}else{document.getElementById('errorMsg').innerText='❌ Sai mật khẩu';}});</script></body>
</html>
